<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>forgeax engine</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: system-ui, sans-serif; }
      #app, canvas { width: 100vw; height: 100vh; display: block; }
      /* Hidden by default — only shown for games that opt into FPS pointer
         lock (forge.json: "pointerLock": true). main.ts flips display on. */
      #hud { position: fixed; top: 12px; left: 12px; padding: 6px 10px; background: rgba(0,0,0,0.5); border-radius: 6px; font-size: 12px; color: #D4FF48; pointer-events: none; display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
