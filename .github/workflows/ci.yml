name: CI

# forgeax-editor standalone "clone-and-run" gate (ideal-clean-architecture.md §6 R7).
#
# The editor is a self-contained repo: `git clone --recurse-submodules` then
# `bun install` must reach SELF-BOOT level B2 (reuse @forgeax/platform-io as the
# game backend → real read + WRITE) with NO studio server. This workflow is the
# permanent gate on that promise — every push / PR re-proves a fresh checkout
# installs and reaches B2.
#
# The B2 self-boot job boots the standalone host (`bun run dev`, :15290) and
# drives the /api/files wire (tree/read/write/confinement) through the host vite
# proxy + game-backend bun process — NO studio server, NO page render. Since the
# single-realm collapse (feat-20260703), the :15290 host bundler is no longer a
# thin react()+proxy shell: its vite config consumes engineVitePreset (the shared
# engine dev-serve fragment), which statically imports the engine's vite plugins
# (@forgeax/engine-vite-plugin-shader/-pack, engine-gltf, engine-image). Vite
# bundles its config through rolldown, so those plugins' dist/*.mjs must exist for
# `bun run dev` to even load its config — hence B2 now needs the engine LIBRARY
# dist (the same .mjs + wgpu-wasm pkg the typecheck job builds), reused via the
# SAME engine-SHA cache below. B2 still never renders a frame, so no runtime wasm
# execution is exercised — only config-load resolution needs dist to be present.
#
# The `typecheck` job (below) is the second gate: it builds the engine's .d.ts
# (cached by submodule SHA — no Rust/cargo, the wasm is committed) and typechecks
# every editor package against the engine's REAL types. This is the permanent
# guard on the `Socket`-class regression — an editor import of a symbol the
# engine does not export fails here, not at the user's runtime in studio.
# Remaining heavier gates (e2e) still live in the studio superrepo CI.

# Doc-only changes are exempt: the B2 self-boot + typecheck gates below can only
# be affected by code / config / submodule pins, never by prose. `paths-ignore`
# skips this heavy workflow for pushes/PRs that touch ONLY these paths (a mixed
# commit that also touches code still runs the full gate).
#
# `main`'s ruleset makes `b2-self-boot` + `typecheck` REQUIRED status checks, so a
# plain skip would leave them "Expected — Waiting for status" forever and deadlock
# the PR. The companion workflow `ci-docs.yml` runs on the INVERSE path filter and
# reports the SAME two check names as an instant pass — so a doc-only PR satisfies
# the ruleset in seconds without booting the engine. The two workflows' path
# filters must stay mutually exclusive; keep them in sync.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  b2-self-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # GHA is the kubeela PAT that can read the private ForgeaXGame/forgeax-*
      # submodules this repo pins (engine / interface / platform-io / editor-assets).
      # Same secret name forgeax-engine's CI uses; set it on this repo with
      #   gh secret set GHA --repo ForgeaXGame/forgeax-editor
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
          token: ${{ secrets.GHA }}

      # ── engine LIBRARY dist (needed since single-realm: the :15290 host vite
      # config consumes engineVitePreset → imports the engine vite plugins, whose
      # dist/*.mjs must exist for `bun run dev` to load its config). Shares the
      # engine-SHA cache with the typecheck job: once either job warms it for a
      # given engine pin, the other hits it instantly (no Rust/tsup rebuild). ──
      - name: Resolve engine submodule SHA
        id: engine
        run: echo "sha=$(git -C packages/engine rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache engine dist (.d.ts + .mjs) + wgpu-wasm pkg
        id: engine-dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/engine/packages/*/dist
            packages/engine/packages/wgpu-wasm/pkg
          key: engine-dist-${{ steps.engine.outputs.sha }}

      # ── cache-miss only: build the engine library (mirrors the typecheck job) ──
      - name: Setup Rust toolchain (for wgpu-wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - name: Setup pnpm
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node (for engine pnpm build)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      # wgpu-wasm MUST build before the engine dist step below: the engine `app`
      # package inlines wgpu-wasm/dist → ../pkg/wgpu_wasm.js at bundle time. Same
      # invariant is statically gated in scripts/fx.ts by
      # scripts/lint-wasm-before-dist.mjs (bun run lint). Keep the two in sync.
      - name: Build wgpu-wasm (Rust → wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: cd packages/engine && bash packages/wgpu-wasm/build.sh

      - name: Build engine library types (.mjs + .d.ts, no demos)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/engine
          pnpm install --frozen-lockfile
          pnpm -r --filter "./packages/*" build
          pnpm exec tsc -b --clean
          pnpm exec tsc -b

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # --ignore-scripts on purpose:
      #   - postinstall runs scripts/sync-harness.mjs which clones a private
      #     forgeax-editor-harness (loop state) — not needed for B2 and would
      #     require harness auth in CI.
      #   - a transitive `simple-git-hooks` postinstall stat's its own
      #     package.json before extraction completes and crashes the FIRST
      #     `bun install` of a clean clone (succeeds only on re-run). Skipping
      #     scripts makes the single-run install deterministic. None of the
      #     skipped scripts are needed to reach B2.
      - name: Install (bun, no scripts, frozen lockfile)
        # --frozen-lockfile: fail CI if bun.lock is out of sync with any
        # package.json (i.e. a manifest change committed without regenerating
        # the lockfile). Keeps `clone 即跑` honest and stops bun.lock drifting
        # dirty in every contributor's working tree.
        run: bun install --frozen-lockfile --ignore-scripts

      # Gate 1 — the reused back-L1 backend's confinement contract (whitelist +
      # single-game slug-strip / traversal). Runs against the platform-io this
      # editor repo pins, so a pin bump that weakens confinement fails here too.
      - name: Test @forgeax/platform-io
        run: bun -F @forgeax/platform-io test

      # Gate 2 — SELF-BOOT B2: boot the game-backend bun process + host vite
      # (NO studio server), exercise /api/files end to end (tree / read / WRITE
      # / persistence / out-of-game rejection). 9/9 or the run is red.
      - name: Self-boot B2 (read + write, no studio server)
        run: bun scripts/selfcheck-standalone-b2.mjs

  # ── typecheck + lint gate ──────────────────────────────────────────────────
  # Independent of the lightweight B2 job above. Proves the editor authors
  # against the engine's REAL types — the permanent guard on the `Socket`-class
  # regression (AGENTS.md anti-pattern #5): an editor import of a symbol the
  # engine does not export must fail HERE (typecheck), not at the user's runtime
  # in studio. tsc can only catch it once the engine's .d.ts exists, so this job
  # builds the engine first (cached by the engine submodule SHA — a cache HIT
  # skips the whole build incl. the Rust step, so steady-state runs are fast; the
  # heavy path runs only when the engine pin actually moves).
  #
  # Only the engine's LIBRARY packages are built (tsup .mjs + tsc -b .d.ts) — not
  # the vite demo apps/* (which would need the forgeax-engine-assets submodule).
  # The wgpu-wasm binary is gitignored, so a cache MISS builds it via Rust +
  # wasm-pack (its committed pkg/*.d.ts shims are in git; the .wasm is not), which
  # tsc -b needs to resolve WebGPU/wgpu types.
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
          token: ${{ secrets.GHA }}

      # The engine submodule's exact commit is the cache key: any pin bump busts
      # the cache and rebuilds dist; an unchanged pin reuses the prior .d.ts.
      - name: Resolve engine submodule SHA
        id: engine
        run: echo "sha=$(git -C packages/engine rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache engine dist (.d.ts + .mjs) + wgpu-wasm pkg
        id: engine-dist-cache
        uses: actions/cache@v4
        with:
          # Every engine package's dist/ (the type surface the editor checks
          # against) + the built wgpu-wasm pkg/ (so a cache hit needs no Rust).
          path: |
            packages/engine/packages/*/dist
            packages/engine/packages/wgpu-wasm/pkg
          key: engine-dist-${{ steps.engine.outputs.sha }}

      # ── cache-miss only: build the engine (mirrors engine CI build-artifacts) ──
      - name: Setup Rust toolchain (for wgpu-wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - name: Setup pnpm
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node (for engine pnpm build)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      # wgpu-wasm MUST build before the engine dist step below: the engine `app`
      # package inlines wgpu-wasm/dist → ../pkg/wgpu_wasm.js at bundle time. Same
      # invariant is statically gated in scripts/fx.ts by
      # scripts/lint-wasm-before-dist.mjs (bun run lint). Keep the two in sync.
      - name: Build wgpu-wasm (Rust → wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: cd packages/engine && bash packages/wgpu-wasm/build.sh

      # Build ONLY the engine's LIBRARY packages' type surface — the editor
      # imports libraries, never the vite demo apps/*. Building apps would pull
      # the forgeax-engine-assets submodule (fbx/gltf fixtures) + importers at
      # bundle time; scoping to packages/* avoids that entirely.
      #   1. tsup each library  -> dist/*.mjs
      #   2. tsc -b (--clean then build) -> dist/*.d.ts via project references
      #      (references list is library packages only, not apps). Needs the
      #      wgpu-wasm build above so WebGPU/wgpu types resolve. Use `pnpm exec`
      #      (not npx) so the workspace-pinned tsc + node_modules resolve right.
      - name: Build engine library types (.mjs + .d.ts, no demos)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/engine
          pnpm install --frozen-lockfile
          pnpm -r --filter "./packages/*" build
          pnpm exec tsc -b --clean
          pnpm exec tsc -b

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (bun, no scripts, frozen lockfile)
        # --frozen-lockfile: fail CI if bun.lock is out of sync with any
        # package.json (i.e. a manifest change committed without regenerating
        # the lockfile). Keeps `clone 即跑` honest and stops bun.lock drifting
        # dirty in every contributor's working tree.
        run: bun install --frozen-lockfile --ignore-scripts

      # Structural gates: sync-channel drift, the engine-shim
      # guard (no bodyless `declare module '@forgeax/engine-*'` that would blind
      # tsc to bad engine imports), the op-via-gateway seam (Gate B), and the
      # editor-trace-ioc Gate A (lint-unique-mutator: raw world writes only in
      # the EngineFacade) + setter-sugar recurrence gate (lint-no-store-setter-sugar).
      - name: Lint (sync-channel + engine-shim + gateway seams)
        run: bun run lint

      # DAG boundary gate (dependency-cruiser): core ← shared ← panels ← runtime.
      - name: Dependency-cycle lint
        run: bun run lint:dep

      # The core gate — every editor package typechecked against the engine's
      # real .d.ts. A `import { Socket }` of a non-existent engine symbol fails
      # here with TS2305.
      - name: Typecheck (all editor packages)
        run: bun run typecheck

      # Core unit tests (snapshot, golden, existing tests) — the editor CI
      # previously did not run any core single-test suite; this step closes
      # that gap so AC-01/AC-05 gates are exercised on every push/PR.
      # plan-strategy D-4 · requirements AC-01/AC-05
      - name: Core unit tests
        run: bun -F @forgeax/editor-core test

      # Edit-runtime unit tests — viewport ray-math, orbit camera, lifecycle,
      # display-switch, input-target, and other edit-runtime pure functions.
      # These tests are DOM/GPU-free and run in bun's test runner.
      #
      # plan-strategy D-12: the level-load run-lifecycle rewrite (M2) moved the
      # AC-04/05/06/07 regression tests (play→stop→play cycle, editWorld freeze
      # snapshots, GC reachability) into the edit-runtime package. This step makes
      # those gates permanent on every push/PR.
      - name: Edit-runtime unit tests
        run: bun -F @forgeax/editor-edit-runtime test

  # ── boot + ▶ Play smoke gate (headless, WebGPU-tolerant) ────────────────────
  # Boots the games/sample standalone stack in headless chromium and asserts:
  #   (1) the stack boots, (2) opening :15290 has no console/page errors,
  #   (3) clicking ▶ Play has no console/page errors.
  # This is the real-browser guard on the SharedRefReleasedError-on-Play class
  # (a plain JS error thrown during scene instantiate → lands in the console
  # stream the spec asserts is empty). The GPU-free unit-test gate is the
  # edit-runtime `Edit-runtime unit tests` step above; this job proves it end to
  # end in a browser.
  #
  # Unlike b2/typecheck this job RENDERS a frame, so it needs the runtime
  # wgpu-wasm binary (built via Rust on a cache miss, same as the other jobs) and
  # a chromium with SwiftShader software WebGPU (playwright.config.ts launch
  # flags). WebGPU/SwiftShader console noise is allowlisted in the spec, so the
  # gate stays green on GPU-less runners while still catching every non-GPU error.
  #
  # NOT a required status check (main's ruleset requires only b2-self-boot +
  # typecheck). A flaky SwiftShader run surfaces red without blocking merges, and
  # — being non-required — needs NO ci-docs.yml mirror (doc-only PRs skip ci.yml
  # via paths-ignore and don't deadlock). Promote to required once proven stable.
  smoke-play:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
          token: ${{ secrets.GHA }}

      # Same engine-SHA cache + build path as b2-self-boot / typecheck. On a hit,
      # engine dist + wgpu-wasm/pkg (the runtime .wasm the render loop loads) are
      # present with no Rust rebuild; on a miss, build them the same way.
      - name: Resolve engine submodule SHA
        id: engine
        run: echo "sha=$(git -C packages/engine rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache engine dist (.d.ts + .mjs) + wgpu-wasm pkg
        id: engine-dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/engine/packages/*/dist
            packages/engine/packages/wgpu-wasm/pkg
          key: engine-dist-${{ steps.engine.outputs.sha }}

      - name: Setup Rust toolchain (for wgpu-wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup wasm-pack
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.14.0

      - name: Setup pnpm
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node (for engine pnpm build)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      # wgpu-wasm before engine dist (see the b2/typecheck jobs + fx.ts gate).
      - name: Build wgpu-wasm (Rust → wasm)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: cd packages/engine && bash packages/wgpu-wasm/build.sh

      - name: Build engine library types (.mjs + .d.ts, no demos)
        if: steps.engine-dist-cache.outputs.cache-hit != 'true'
        run: |
          cd packages/engine
          pnpm install --frozen-lockfile
          pnpm -r --filter "./packages/*" build
          pnpm exec tsc -b --clean
          pnpm exec tsc -b

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install (bun, no scripts, frozen lockfile)
        # --frozen-lockfile: fail CI if bun.lock is out of sync with any
        # package.json (i.e. a manifest change committed without regenerating
        # the lockfile). Keeps `clone 即跑` honest and stops bun.lock drifting
        # dirty in every contributor's working tree.
        run: bun install --frozen-lockfile --ignore-scripts

      # Chromium + its OS deps for headless (SwiftShader) WebGPU.
      - name: Install Playwright chromium
        run: bunx playwright install --with-deps chromium

      # Playwright's webServer array boots the games/sample stack (host :15290 +
      # play-runtime :15173 + game-backend :15281); reuseExistingServer is false
      # in CI so it starts fresh. Run only the smoke spec.
      - name: Boot + Play smoke (games/sample)
        run: bun run test:e2e e2e/smoke-boot-play.spec.ts

      # Content Browser smoke: right-click Delete & Add-to-Scene interactions.
      # Reuses the same webServer stack started above (Playwright caches it).
      - name: Content Browser smoke (games/sample)
        run: bun run test:e2e e2e/smoke-content-browser.spec.ts
